<body>

<header class="header">

<div class="container header-inner">

<a href="https://komisjonikaubamaja.github.io/" class="logo">
Komisjoni<span>kaubamaja</span>
</a>

<a href="https://komisjonikaubamaja.github.io/" class="back-btn">
← Avaleht
</a>
<button id="wishlistToggle" class="wishlist-toggle">
    ❤️ <span id="wishlistCount">0</span>
</button>
</div>

</header>

<section class="catalog-header">

<div class="container">

<h1>Kasutatud elektroonika</h1>

<p>
Sirvi kontrollitud seadmeid üle Eesti.
</p>

<div class="search-row">

<input
type="text"
id="searchInput"
placeholder="Otsi telefoni, arvutit või muud..."
>

<select id="mainCategoryFilter">
    <option value="">Kõik peakategooriad</option>
</select>

<select id="groupCategoryFilter">
    <option value="">Kõik alamkategooriad</option>
</select>

<select id="categoryFilter">
    <option value="">Kõige alumised kategooriad</option>
</select>

<select id="sortSelect">
<option value="newest">Uuemad eespool</option>
<option value="priceLow">Hind ↑</option>
<option value="priceHigh">Hind ↓</option>
</select>

</div>

</div>

</section>

<section class="catalog">

<div class="container">

<div id="productsGrid" class="products-grid">

<div class="loading">
Laen tooteid...
</div>

</div>

<div id="loadingMore" class="loading-more">
Laen veel...
</div>

</div>

</section>

<script type="module">

import { initializeApp }

const firebaseConfig = {

const CATEGORY_TREE = {

        ],

        "Mänguasjad": [
            "Mänguasjad: Mehaanilised ja üleskeeratavad",
            "Mänguasjad: Rollimängud",
            "Mänguasjad: Suvised mänguasjad",
            "Mudelid ja raadio teel juhitavad autod"
        ]
    },

    "Kodu ja sisustus": {

        "Kodu": [
            "Aed ja õu",
            "Lambid ja peeglid",
            "Vannitoasisustus",
            "Sisustuselemendid ja muu",
            "Muud kodutarbed"
        ]
    },

    "Tööriistad ja masinad": {

        "Tööriistad": [
            "Tööriistad",
            "Ehitusmasinad",
            "Autoteeninduse ja -remondi seadmed"
        ],

        "Masinad": [
            "Kudumis- ja õmblusmasinad",
            "Muud masinad ja seadmed"
        ]
    }

};
    
const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

const productsGrid =
document.getElementById("productsGrid");

const searchInput =
document.getElementById("searchInput");

const params =
new URLSearchParams(
    window.location.search
);

const initialSearch =
params.get("search");

if(initialSearch){

    searchInput.value =
    initialSearch;

}
  
const mainCategoryFilter =
document.getElementById("mainCategoryFilter");

const groupCategoryFilter =
document.getElementById("groupCategoryFilter");

const categoryFilter =
document.getElementById("categoryFilter");

const sortSelect =
document.getElementById("sortSelect");

const loadingMore =
document.getElementById("loadingMore");

let allProducts = [];

let lastDoc = null;

let loading = false;

let finished = false;

const PAGE_SIZE = 12;

function createCard(product){

const wishlist =
JSON.parse(localStorage.getItem("wishlist") || "[]");

const isLiked =
wishlist.includes(product.id);

return `
<a href="toode.html?id=${product.id}" class="product-card">

    <button
        class="wishlist-btn ${isLiked ? "active" : ""}"
        onclick="event.preventDefault();toggleWishlist('${product.id}')"
    >
        ❤️
    </button>

    <img src="${product.image}" loading="lazy">

    <div class="product-info">

        <span class="category">${product.category}</span>

        <h3>${product.title}</h3>

        <div class="bottom">
            <div class="price">${product.price}€</div>
            <div class="condition">${product.condition}</div>
        </div>

    </div>

</a>
`;
}

async function loadProducts(){

if(loading || finished) return;

loading = true;

loadingMore.style.display = "block";

let q = query(
collection(db,"products"),
orderBy("createdAt","desc"),
limit(PAGE_SIZE)
);

if(lastDoc){

q = query(
collection(db,"products"),
orderBy("createdAt","desc"),
startAfter(lastDoc),
limit(PAGE_SIZE)
);

}

const snapshot =
await getDocs(q);

if(snapshot.empty){

finished = true;

loadingMore.style.display = "none";

return;

}

lastDoc =
snapshot.docs[snapshot.docs.length - 1];

snapshot.forEach(doc=>{

    allProducts.push({
        id:doc.id,
        ...doc.data()
    });

});

updateCategoryFilter();

renderProducts();
loading = false;

}

function renderProducts(){

let products =
[...allProducts];

const search =
searchInput.value.toLowerCase();

const category =
categoryFilter.value;

if(search){

products =
products.filter(p=>

p.title
.toLowerCase()
.includes(search)

);

}

const mainCategory =
mainCategoryFilter.value;

const subCategory =
subCategoryFilter.value;

const category =
categoryFilter.value;

if(mainCategory){

    products =
    products.filter(
        p =>
        p.mainCategory ===
        mainCategory
    );

}

if(subCategory){

    products =
    products.filter(
        p =>
        p.subCategory ===
        subCategory
    );

}

if(category){

    products =
    products.filter(
        p =>
        p.category ===
        category
    );

}

const sort =
sortSelect.value;

if(sort === "priceLow"){

products.sort(
(a,b)=>
a.price-b.price
);

}

if(sort === "priceHigh"){

products.sort(
(a,b)=>
b.price-a.price
);

}

productsGrid.innerHTML =
products.map(createCard)
.join("");

if(products.length===0){

productsGrid.innerHTML =

`
<div class="empty">
Tooteid ei leitud.
</div>
`;

}

}

searchInput.addEventListener(
"input",
renderProducts
);

categoryFilter.addEventListener(
"change",
renderProducts
);

sortSelect.addEventListener(
"change",
renderProducts
);

window.addEventListener(
"scroll",
()=>{

if(

window.innerHeight +
window.scrollY

>=

document.body.offsetHeight
-1000

){

loadProducts();

}

}
);

loadProducts();

window.toggleWishlist = function(productId){

    let wishlist =
    JSON.parse(
        localStorage.getItem("wishlist")
        || "[]"
    );

    if(wishlist.includes(productId)){

        wishlist =
        wishlist.filter(
            id => id !== productId
        );

    }else{

        wishlist.push(productId);

    }

    localStorage.setItem(
        "wishlist",
        JSON.stringify(wishlist)
    );

    renderProducts();

};
const wishlistPanel =
document.getElementById("wishlistPanel");

const wishlistToggle =
document.getElementById("wishlistToggle");

const wishlistItems =
document.getElementById("wishlistItems");

const closeWishlist =
document.getElementById("closeWishlist");

wishlistToggle.addEventListener("click", () => {
    wishlistPanel.classList.add("open");
    renderWishlist();
});

closeWishlist.addEventListener("click", () => {
    wishlistPanel.classList.remove("open");
});

window.toggleWishlist = function(id){

    let wishlist =
    JSON.parse(localStorage.getItem("wishlist") || "[]");

    if(wishlist.includes(id)){
        wishlist = wishlist.filter(x => x !== id);
    } else {
        wishlist.push(id);
    }

    localStorage.setItem("wishlist", JSON.stringify(wishlist));

    updateWishlistCount();
    renderProducts();
    renderWishlist();

};

function updateWishlistCount(){

    const wishlist =
    JSON.parse(localStorage.getItem("wishlist") || "[]");

    document.getElementById("wishlistCount").textContent =
    wishlist.length;

}

async function renderWishlist(){

    const wishlist =
    JSON.parse(localStorage.getItem("wishlist") || "[]");

    updateWishlistCount();

    if(wishlist.length === 0){
        wishlistItems.innerHTML =
        `<p class="empty">Pole lemmikuid</p>`;
        return;
    }

    const html = allProducts
        .filter(p => wishlist.includes(p.id))
        .map(p => `
            <a class="wishlist-item" href="toode.html?id=${p.id}">
                <img src="${p.image}">
                <div>
                    <h4>${p.title}</h4>
                    <span>${p.price}€</span>
                </div>
            </a>
        `)
        .join("");

    wishlistItems.innerHTML = html;
}

updateWishlistCount();
function updateCategoryFilter(){

    const categories =
    [...new Set(

        allProducts
        .map(product => product.category)
        .filter(Boolean)

    )]
    .sort();

    categoryFilter.innerHTML =
    `
    <option value="">
        Kõik kategooriad
    </option>
    `;

    categories.forEach(category => {

        const option =
        document.createElement("option");

        option.value =
        category;

        option.textContent =
        category;

        categoryFilter.appendChild(option);

    });

}
function loadMainCategories(){

    mainCategoryFilter.innerHTML =
    `<option value="">Kõik peakategooriad</option>`;

    Object.keys(CATEGORY_TREE)
    .forEach(main=>{

        const option =
        document.createElement("option");

        option.value = main;
        option.textContent = main;

        mainCategoryFilter.appendChild(option);

    });

}
mainCategoryFilter.addEventListener(
"change",
()=>{

    const main =
    mainCategoryFilter.value;

    groupCategoryFilter.innerHTML =
    `<option value="">Kõik grupid</option>`;

    categoryFilter.innerHTML =
    `<option value="">Kõik kategooriad</option>`;

    if(!main){

        renderProducts();
        return;
    }

    Object.keys(
        CATEGORY_TREE[main]
    ).forEach(group=>{

        const option =
        document.createElement("option");

        option.value = group;
        option.textContent = group;

        groupCategoryFilter.appendChild(
            option
        );

    });

    renderProducts();

});
loadMainCategories();

groupCategoryFilter.addEventListener(
"change",
()=>{

    const main =
    mainCategoryFilter.value;

    const group =
    groupCategoryFilter.value;

    categoryFilter.innerHTML =
    `<option value="">Kõik kategooriad</option>`;

    if(!main || !group){

        renderProducts();
        return;
    }

    CATEGORY_TREE[main][group]
    .forEach(category=>{

        const option =
        document.createElement("option");

        option.value =
        category;

        option.textContent =
        category;

        categoryFilter.appendChild(
            option
        );

    });

    renderProducts();

});
mainCategoryFilter.addEventListener(
"change",
renderProducts
);

groupCategoryFilter.addEventListener(
"change",
renderProducts
);

categoryFilter.addEventListener(
"change",
renderProducts
);
</script>
<div id="wishlistPanel" class="wishlist-panel">

    <div class="wishlist-header">
        <h3>Lemmikud</h3>
        <button id="closeWishlist">✕</button>
    </div>

    <div id="wishlistItems" class="wishlist-items">
        <p class="empty">Pole lemmikuid</p>
    </div>

</div>
</body>
