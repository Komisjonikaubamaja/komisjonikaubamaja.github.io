<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel | Komisjonikaubamaja</title>

<link rel="stylesheet" href="admin.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<!-- LOGIN -->

<section id="loginBox" class="login-box">

    <div class="login-card">

        <h1>Admin Panel</h1>

        <p>
            Logi sisse Google kontoga
        </p>

        <button id="loginBtn" class="btn-primary">
            Logi sisse Google'iga
        </button>

    </div>

</section>

<!-- ADMIN -->

<section id="adminPanel" class="admin-panel hidden">

    <div class="topbar">

        <div>
            <h1>Komisjonikaubamaja Admin</h1>
            <p id="adminEmail"></p>
        </div>

        <button onclick="logoutAdmin()" class="btn-danger">
            Logi välja
        </button>

    </div>

    <!-- STATS -->

    <div class="stats-grid">

        <div class="stat-card">
            <span>Kokku tooteid</span>
            <h2 id="totalProducts">0</h2>
        </div>

        <div class="stat-card">
            <span>Kategooriaid</span>
            <h2 id="totalCategories">0</h2>
        </div>

        <div class="stat-card">
            <span>Laoühikuid</span>
            <h2 id="totalStock">0</h2>
        </div>

    </div>

    <section class="admin-section">

    <h2>📨 Saabunud pakkumised</h2>

    <div id="offersContainer" class="offers-container">

        <div class="loading-offers">
            Laen pakkumisi...
        </div>

    </div>

    </section>

    <!-- ADD PRODUCT -->

    <div class="card">

        <h2>Lisa uus toode</h2>

        <input
            id="title"
            type="text"
            placeholder="Toote nimi"
        >

        <input
            id="price"
            type="number"
            placeholder="Hind (€)"
        >

        <select id="category">

            <option>Telefonid</option>
            <option>Sülearvutid</option>
            <option>Konsoolid</option>
            <option>Muusikakeskused</option>
            <option>Nutikellad</option>
            <option>Kaamerad</option>
            <option>Kõrvaklapid</option>
            <option>Kontoriarvutid</option>
            <option>Jalgrattad</option>
            <option>Mänguriarvutid</option>
            <option>Monitorid</option>
            <option>Televiisorid</option>
            <option>Nutiboksid</option>
            <option>Spordiriided</option>
            <option>Arvutihiired</option>
            <option>Klaviatuurid</option>
            <option>Kõlarid</option>
            <option>Tahvelarvutid</option>
            <option>Arvutikomponendid</option>
            <option>DVD</option>
            <option>Tööriistad</option>
            <option>Serverid</option>
            <option>Valvekaamerad</option>
            <option>Videomängud</option>
            <option>Õhupüssid</option>
            <option>Tolmuimejad</option>
            <option>Rösterid</option>
            <option>Veekeetjad</option>
            <option>Suusad</option>
            <option>Pliidid</option>
            <option>Printerid</option>
            <option>Talveriided</option>
            <option>Kotid</option>
            <option>VHS</option>
            <option>Lauatelefonid</option>
            <option>DJ-puldid</option>
            <option>Kodukino</option>
            <option>Kassaaparaadid</option>
            <option>Telefoniümbrised</option>
            

        </select>

        <textarea
            id="description"
            placeholder="Kirjeldus"
        ></textarea>

        <input
            id="condition"
            type="text"
            placeholder="Seisukord"
        >

        <input
            id="stock"
            type="number"
            value="1"
        >

        <textarea
            id="images"
            placeholder="Piltide URL-id (üks igale reale)"
        ></textarea>

        <button
            id="publishBtn"
            class="btn-primary"
        >
            Avalda toode
        </button>

        <div id="success" class="success"></div>
        <div id="error" class="error"></div>

    </div>

    <!-- PRODUCTS -->

    <div class="card">

        <h2>Tooted</h2>

        <div id="productsList">

            Laen...

        </div>

    </div>

    <section class="admin-section">

    <h2>📦 Toodete haldus</h2>

    <div id="productsManager">

        <div class="loading">
            Laen tooteid...
        </div>

    </div>

</section>

</section>

<script type="module" src="admin.js"></script>
<!-- EDIT PRODUCT MODAL -->

<div id="editModal" class="modal hidden">

    <div class="modal-content">

        <div class="modal-header">

            <h2>Muuda toodet</h2>

            <button
                id="closeModalBtn"
                class="close-modal"
            >
                ✕
            </button>

        </div>

        <input
            type="text"
            id="editTitle"
            placeholder="Toote nimi"
        >

        <input
            type="number"
            id="editPrice"
            placeholder="Hind"
        >

        <input
            type="text"
            id="editCategory"
            placeholder="Kategooria"
        >

        <input
            type="text"
            id="editCondition"
            placeholder="Seisukord"
        >

        <select id="editStatus">

            <option value="available">
                Saadaval
            </option>

            <option value="reserved">
                Broneeritud
            </option>

            <option value="sold">
                Müüdud
            </option>

            <option value="hidden">
                Peidetud
            </option>

        </select>

        <textarea
            id="editDescription"
            placeholder="Kirjeldus"
        ></textarea>

        <textarea
            id="editImages"
            placeholder="Pildid (üks URL rea kohta)"
        ></textarea>

        <button
            id="saveProductBtn"
            class="save-product-btn"
        >
            Salvesta muudatused
        </button>

    </div>

</div>
</body>
</html>
